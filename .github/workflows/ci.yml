name: ci

# Standard CI: build + unit tests on every push/PR. The SDK
# compatibility smoke step is the load-bearing one — it spawns
# the built shuttle binary and exchanges JSON-RPC over stdin/stdout
# to verify shuttle still implements the omegon-extension v2
# protocol correctly. Catches drift between shuttle and the
# omegon-extension version it depends on.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build + test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build (release)
        run: cargo build --release

      - name: Unit tests
        # Tests in tests/unit.rs only — tests/integration.rs requires
        # a live sshd container (see test-infra/) and is run manually.
        run: cargo test --test unit

      - name: SDK compatibility smoke
        # Spawns the built shuttle binary as a subprocess, sends an
        # initialize request via stdin, and verifies the response
        # matches the omegon-extension v2 contract. If the SDK we
        # depend on changes its handshake shape, this fails BEFORE
        # we publish a release that would break operators' installs.
        run: |
          BIN=target/release/shuttle
          test -x "$BIN" || { echo "binary missing"; exit 1; }
          RESP=$(echo '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{}}' | "$BIN" --rpc | head -n1)
          echo "Response: $RESP"
          # Required fields per omegon-extension v2 protocol.
          echo "$RESP" | grep -q '"protocol_version":2' || { echo "FAIL: missing protocol_version=2"; exit 1; }
          echo "$RESP" | grep -q '"name":"shuttle"' || { echo "FAIL: missing extension_info.name=shuttle"; exit 1; }
          echo "$RESP" | grep -q '"jsonrpc":"2.0"' || { echo "FAIL: not a JSON-RPC 2.0 response"; exit 1; }
          echo "SDK contract OK"
